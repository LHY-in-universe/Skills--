<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Sprite</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  background: transparent;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
  font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif;
}

/* ─── Compact orb ─── */
#orb {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 33%, #a78bfa, #6d28d9 55%, #1e1b4b);
  box-shadow:
    0 0 0 1px rgba(167,139,250,0.18),
    0 0 18px rgba(109,40,217,0.55),
    0 4px 20px rgba(0,0,0,0.4);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
  position: relative;
}
#orb::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 28%, rgba(255,255,255,0.18), transparent 58%);
  pointer-events: none;
}
#orb:hover {
  transform: scale(1.08);
  box-shadow:
    0 0 0 1px rgba(167,139,250,0.28),
    0 0 28px rgba(109,40,217,0.75),
    0 6px 24px rgba(0,0,0,0.45);
}
#orb:active { transform: scale(0.95); }

/* ─── Chat panel ─── */
#panel {
  display: none;
  flex-direction: column;
  width: 100%; height: 100%;
  background: rgba(9, 7, 19, 0.97);
  border: 1px solid rgba(109,40,217,0.32);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
}
#panel.open { display: flex; }

/* Header */
#hdr {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 10px 12px 10px 14px;
  border-bottom: 1px solid rgba(109,40,217,0.14);
  background: linear-gradient(135deg, rgba(109,40,217,0.09), rgba(79,70,229,0.03));
  -webkit-app-region: drag;
  flex-shrink: 0;
}
.hdr-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #7c3aed;
  box-shadow: 0 0 7px #7c3aed;
  flex-shrink: 0;
  animation: hglow 2.8s ease-in-out infinite;
}
@keyframes hglow {
  0%,100% { opacity:1; box-shadow: 0 0 7px #7c3aed; }
  50%      { opacity:.45; box-shadow: 0 0 3px #7c3aed; }
}
.hdr-title {
  flex: 1;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: rgba(148,163,184,0.55);
  text-transform: uppercase;
}
.hdr-btn {
  -webkit-app-region: no-drag;
  width: 25px; height: 25px;
  border-radius: 6px;
  border: 1px solid rgba(109,40,217,0.18);
  background: transparent;
  color: rgba(100,116,139,0.55);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.13s;
}
.hdr-btn:hover {
  background: rgba(109,40,217,0.13);
  border-color: rgba(109,40,217,0.4);
  color: rgba(167,139,250,0.9);
}

/* Messages */
#msgs {
  flex: 1;
  overflow-y: auto;
  padding: 13px 13px 6px;
  display: flex;
  flex-direction: column;
  gap: 9px;
  scroll-behavior: smooth;
}
#msgs::-webkit-scrollbar { width: 3px; }
#msgs::-webkit-scrollbar-track { background: transparent; }
#msgs::-webkit-scrollbar-thumb { background: rgba(109,40,217,0.22); border-radius: 2px; }

/* Empty state */
#empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 9px;
  padding-bottom: 20px;
  pointer-events: none;
}
#empty svg { opacity: 0.18; }
#empty span { font-size: 11.5px; color: rgba(100,116,139,0.5); letter-spacing: 0.04em; }

/* Message bubbles */
.msg {
  display: flex;
  flex-direction: column;
  max-width: 90%;
  animation: msgIn 0.18s ease;
}
@keyframes msgIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }

.msg.user { align-self: flex-end; }
.msg.ai   { align-self: flex-start; }

.bubble {
  padding: 8px 12px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.68;
  word-break: break-word;
  -webkit-user-select: text;
  user-select: text;
}
.msg.user .bubble {
  background: rgba(91,33,182,0.24);
  border: 1px solid rgba(109,40,217,0.36);
  color: #ddd6fe;
  border-bottom-right-radius: 3px;
}
.msg.ai .bubble {
  background: rgba(255,255,255,0.033);
  border: 1px solid rgba(255,255,255,0.065);
  color: #cbd5e1;
  border-bottom-left-radius: 3px;
}
.bubble pre {
  background: rgba(0,0,0,0.38);
  border: 1px solid rgba(109,40,217,0.14);
  border-radius: 7px;
  padding: 9px 11px;
  margin: 7px -1px 4px;
  overflow-x: auto;
  font-size: 11.5px;
  line-height: 1.5;
}
.bubble code {
  font-family: 'SF Mono','Menlo','Monaco',monospace;
  font-size: 11.5px;
}
.bubble p { margin: 0; }
.bubble p + p { margin-top: 5px; }
.bubble strong { color: #e2e8f0; }

/* Streaming cursor */
.streaming-bub::after {
  content: '▋';
  display: inline;
  animation: cur 0.7s step-end infinite;
  color: rgba(167,139,250,0.9);
  margin-left: 1px;
}
@keyframes cur {
  0%,100% { opacity:1; }
  50%      { opacity:0; }
}

/* Route tier badge */
.tier-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  border-radius: 20px;
  padding: 2px 8px;
  margin-top: 4px;
  align-self: flex-start;
  font-family: 'SF Mono','Menlo',monospace;
  letter-spacing: 0.03em;
}
.tier-easy   { background: rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.2);  color: rgba(52,211,153,0.8); }
.tier-medium { background: rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.2);  color: rgba(251,191,36,0.8); }
.tier-hard   { background: rgba(239,68,68,0.08);  border:1px solid rgba(239,68,68,0.2);   color: rgba(252,165,165,0.8); }

/* Tool indicator */
.tool-row {
  align-self: flex-start;
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10.5px;
  color: rgba(109,40,217,0.65);
  background: rgba(109,40,217,0.06);
  border: 1px solid rgba(109,40,217,0.15);
  border-radius: 20px;
  padding: 2px 10px 2px 7px;
}
.tool-row svg { opacity: 0.7; }

/* Typing */
.typing-bub {
  background: rgba(255,255,255,0.033);
  border: 1px solid rgba(255,255,255,0.065);
  border-radius: 12px;
  border-bottom-left-radius: 3px;
  padding: 10px 14px;
  display: inline-flex;
  gap: 4px;
  align-items: center;
  align-self: flex-start;
}
.td {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(109,40,217,0.65);
  animation: tdot 1.1s ease-in-out infinite;
}
.td:nth-child(2) { animation-delay:.17s; }
.td:nth-child(3) { animation-delay:.34s; }
@keyframes tdot {
  0%,60%,100% { transform:translateY(0); opacity:.5; }
  30%          { transform:translateY(-5px); opacity:1; }
}

/* Permission bar */
#perm {
  display: none;
  padding: 9px 13px;
  background: rgba(202,138,4,0.06);
  border-top: 1px solid rgba(202,138,4,0.18);
  flex-shrink: 0;
}
#perm.show { display: block; }
#perm-msg {
  font-size: 11.5px;
  color: rgba(253,224,71,0.78);
  line-height: 1.5;
  margin-bottom: 7px;
  -webkit-user-select: text;
  user-select: text;
  white-space: pre-wrap;
}
#perm-btns { display: flex; gap: 6px; }
.pb {
  padding: 3px 11px;
  border-radius: 5px;
  font-size: 11px;
  cursor: pointer;
  border: 1px solid;
  background: transparent;
  transition: background 0.1s;
  -webkit-user-select: none;
}
.pb:hover { background: rgba(255,255,255,0.06); }
.pb-allow  { border-color: rgba(34,197,94,0.3);  color: #86efac; }
.pb-always { border-color: rgba(109,40,217,0.35); color: #c4b5fd; }
.pb-deny   { border-color: rgba(239,68,68,0.3);   color: #fca5a5; }

/* Input area */
#inp-wrap {
  display: flex;
  align-items: flex-end;
  gap: 7px;
  padding: 9px 11px 11px;
  border-top: 1px solid rgba(109,40,217,0.1);
  flex-shrink: 0;
}
#inp {
  flex: 1;
  background: rgba(255,255,255,0.038);
  border: 1px solid rgba(109,40,217,0.16);
  border-radius: 10px;
  padding: 8px 11px;
  color: #e2e8f0;
  font-size: 13px;
  font-family: inherit;
  resize: none;
  min-height: 36px;
  max-height: 100px;
  outline: none;
  transition: border-color 0.13s;
  line-height: 1.55;
  -webkit-user-select: text;
  user-select: text;
}
#inp::placeholder { color: rgba(255,255,255,0.17); }
#inp:focus { border-color: rgba(109,40,217,0.42); }
#send-btn {
  width: 33px; height: 33px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.13s, transform 0.09s;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(109,40,217,0.32);
}
#send-btn:hover  { opacity: 0.82; }
#send-btn:active { transform: scale(0.9); }
#send-btn:disabled { opacity: 0.22; cursor: default; transform: none; }
#stop-btn {
  display: none;
  width: 33px; height: 33px;
  border-radius: 8px;
  border: 1px solid rgba(239,68,68,0.35);
  background: rgba(239,68,68,0.08);
  cursor: pointer;
  align-items: center;
  justify-content: center;
  transition: background 0.13s, transform 0.09s;
  flex-shrink: 0;
}
#stop-btn:hover  { background: rgba(239,68,68,0.18); }
#stop-btn:active { transform: scale(0.9); }
</style>
</head>
<body>

<!-- Compact orb -->
<div id="orb">
  <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
    <path d="M4 7h18M4 13h12M4 19h15" stroke="rgba(255,255,255,0.82)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="21" cy="19" r="3.5" fill="rgba(167,139,250,0.9)"/>
    <circle cx="21" cy="19" r="1.5" fill="white"/>
  </svg>
</div>

<!-- Chat panel -->
<div id="panel">

  <!-- Header -->
  <div id="hdr">
    <div class="hdr-dot"></div>
    <span class="hdr-title">Sprite</span>
    <!-- New conversation -->
    <button class="hdr-btn" id="new-btn" title="新对话">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
    </button>
    <!-- Collapse -->
    <button class="hdr-btn" id="close-btn" title="收起">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Message list -->
  <div id="msgs">
    <div id="empty">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
      <span>开始新对话</span>
    </div>
  </div>

  <!-- Permission bar -->
  <div id="perm">
    <div id="perm-msg"></div>
    <div id="perm-btns">
      <button class="pb pb-allow"  data-action="allow">允许</button>
      <button class="pb pb-always" data-action="always">始终允许</button>
      <button class="pb pb-deny"   data-action="deny">拒绝</button>
    </div>
  </div>

  <!-- Input -->
  <div id="inp-wrap">
    <textarea id="inp" rows="1" placeholder="问点什么…"></textarea>
    <button id="send-btn" title="发送">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
    <button id="stop-btn" title="停止">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="rgba(252,165,165,0.9)">
        <rect x="4" y="4" width="16" height="16" rx="2"/>
      </svg>
    </button>
  </div>

</div><!-- #panel -->

<script>
'use strict'
const API = 'http://localhost:8000'

const $ = id => document.getElementById(id)
const orb      = $('orb')
const panel    = $('panel')
const msgs     = $('msgs')
const emptyEl  = $('empty')
const inpEl    = $('inp')
const sendBtn  = $('send-btn')
const closeBtn = $('close-btn')
const newBtn   = $('new-btn')
const permEl   = $('perm')
const permMsg  = $('perm-msg')

let busy = false
let typingNode = null
const stopBtn  = $('stop-btn')

// ── Expand / Collapse ────────────────────────────────────────
async function expand() {
  orb.style.display = 'none'
  panel.classList.add('open')
  window.electronAPI?.toggleCompact(false)
  await startFresh()
  inpEl.focus()
}

function collapse() {
  panel.classList.remove('open')
  orb.style.display = 'flex'
  window.electronAPI?.toggleCompact(true)
  if (busy) {
    fetch(`${API}/api/chat/abort`, { method: 'POST' }).catch(() => {})
    busy = false
    removeTyping()
    setSend(true)
  }
}

async function startFresh() {
  try { await fetch(`${API}/api/history/clear`, { method: 'POST' }) } catch (_) {}
  msgs.innerHTML = ''
  msgs.appendChild(emptyEl)
  emptyEl.style.display = ''
  permEl.classList.remove('show')
  inpEl.value = ''
  resizeInp()
}

orb.addEventListener('click', expand)
closeBtn.addEventListener('click', collapse)
newBtn.addEventListener('click', startFresh)

// ── Markdown renderer (no deps) ──────────────────────────────
function md(raw) {
  if (!raw) return ''
  let s = raw
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')

  // Fenced code blocks
  s = s.replace(/```[\w]*\n([\s\S]*?)```/g, (_, c) =>
    `<pre><code>${c.trimEnd()}</code></pre>`)
  s = s.replace(/```([\s\S]*?)```/g, (_, c) =>
    `<pre><code>${c.trimEnd()}</code></pre>`)

  // Inline code
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>')
  // Bold
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
  // Split into blocks and render lists
  s = s.split(/\n\n+/).map(block => {
    const lines = block.split('\n')
    const isItem = l => /^[-*] /.test(l)
    if (lines.some(isItem)) {
      let html = ''
      let inList = false
      for (const l of lines) {
        if (isItem(l)) {
          if (!inList) { html += '<ul style="margin:4px 0 4px 14px;padding:0">'; inList = true }
          html += `<li>${l.slice(2)}</li>`
        } else {
          if (inList) { html += '</ul>'; inList = false }
          html += `${l}<br>`
        }
      }
      if (inList) html += '</ul>'
      return html
    }
    return `<p>${block.replace(/\n/g,'<br>')}</p>`
  }).join('')
  return s
}

// ── DOM helpers ──────────────────────────────────────────────
function hideEmpty() { emptyEl.style.display = 'none' }

function appendMsg(role, content) {
  hideEmpty()
  const wrap = document.createElement('div')
  wrap.className = `msg ${role === 'user' ? 'user' : 'ai'}`
  const bub = document.createElement('div')
  bub.className = 'bubble'
  bub.innerHTML = md(content)
  wrap.appendChild(bub)
  msgs.appendChild(wrap)
  scroll()
}

function appendToolRow(name) {
  hideEmpty()
  const row = document.createElement('div')
  row.className = 'tool-row'
  row.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M7 2l10 10L7 22"/></svg>${name}`
  msgs.appendChild(row)
  scroll()
}

function showTyping() {
  typingNode = document.createElement('div')
  typingNode.className = 'typing-bub'
  typingNode.innerHTML = '<div class="td"></div><div class="td"></div><div class="td"></div>'
  msgs.appendChild(typingNode)
  scroll()
}

function removeTyping() {
  if (typingNode) { typingNode.remove(); typingNode = null }
}

function scroll() { msgs.scrollTop = msgs.scrollHeight }

function setSend(on) {
  busy = !on
  sendBtn.disabled = !on
  sendBtn.style.display = on ? '' : 'none'
  stopBtn.style.display  = on ? 'none' : 'flex'
}

stopBtn.addEventListener('click', () => {
  fetch(`${API}/api/chat/abort`, { method: 'POST' }).catch(() => {})
  removeTyping()
  setSend(true)
})

// ── SSE stream reader ────────────────────────────────────────
let streamingNode = null

function getOrCreateStreamingBubble() {
  if (!streamingNode) {
    hideEmpty()
    streamingNode = document.createElement('div')
    streamingNode.className = 'msg ai'
    const bub = document.createElement('div')
    bub.className = 'bubble streaming-bub'
    streamingNode.appendChild(bub)
    msgs.appendChild(streamingNode)
  }
  return streamingNode.querySelector('.streaming-bub')
}

function finalizeStreamingBubble() {
  if (streamingNode) {
    streamingNode.querySelector('.streaming-bub')?.classList.remove('streaming-bub')
    streamingNode = null
  }
}

async function processStream(response) {
  const reader = response.body.getReader()
  const decoder = new TextDecoder()
  let buffer = ''
  let accText = ''

  while (true) {
    const { done, value } = await reader.read()
    if (done) break
    buffer += decoder.decode(value, { stream: true })
    const lines = buffer.split('\n')
    buffer = lines.pop() ?? ''

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue
      let event
      try { event = JSON.parse(line.slice(6)) } catch { continue }

      switch (event.type) {
        case 'text': {
          removeTyping()
          accText += event.content
          const bub = getOrCreateStreamingBubble()
          bub.innerHTML = md(accText)
          scroll()
          break
        }
        case 'tool_start':
          appendToolRow(event.name)
          break

        case 'permission_required':
          finalizeStreamingBubble()
          accText = ''
          removeTyping()
          appendToolRow(event.tool_name || '工具')
          permMsg.textContent = event.description
            ? `${event.tool_name}\n${event.description}`
            : event.tool_name || '需要权限'
          permEl.classList.add('show')
          return  // keep busy=true

        case 'aborted':
          finalizeStreamingBubble()
          accText = ''
          removeTyping()
          setSend(true)
          return

        case 'error':
          finalizeStreamingBubble()
          accText = ''
          removeTyping()
          appendMsg('ai', event.content)
          setSend(true)
          return

        case 'done':
          finalizeStreamingBubble()
          accText = ''
          removeTyping()
          if (event._tier) appendTierBadge(event._tier, event._model || '')
          setSend(true)
          inpEl.focus()
          return
      }
    }
  }
}

// ── Chat ─────────────────────────────────────────────────────
async function doSend() {
  const text = inpEl.value.trim()
  if (!text || busy) return
  inpEl.value = ''
  resizeInp()
  appendMsg('user', text)
  setSend(false)
  showTyping()

  try {
    const res = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_input: text })
    })
    if (!res.ok) throw new Error(`${res.status}`)
    await processStream(res)
  } catch (e) {
    finalizeStreamingBubble()
    removeTyping()
    appendMsg('ai', '无法连接后端服务，请确认已在 localhost:8000 启动。')
    setSend(true)
  }
}

function appendTierBadge(tier, modelId) {
  const ICONS = { easy: '🟢', medium: '🟡', hard: '🔴' }
  const badge = document.createElement('div')
  badge.className = `tier-badge tier-${tier}`
  // Show short model name (last segment after /)
  const short = modelId ? modelId.split('/').pop() : ''
  badge.textContent = `${ICONS[tier] || '◆'} ${tier}${short ? ' · ' + short : ''}`
  msgs.appendChild(badge)
  scroll()
}

function handleResp(data) {
  // Permission required
  if (data.type === 'permission_required') {
    appendToolRow(data.tool_name || '工具')
    permMsg.textContent = data.description
      ? `${data.tool_name}\n${data.description}`
      : data.tool_name || '需要权限'
    permEl.classList.add('show')
    // busy 保持 true，阻止权限等待期间发送新消息
    removeTyping()
    return
  }
  // Normal reply
  if (data.content) appendMsg('ai', data.content)
  // Routing tier badge
  if (data._tier) appendTierBadge(data._tier, data._model || '')
  setSend(true)
  inpEl.focus()
}

// ── Permission ───────────────────────────────────────────────
$('perm-btns').addEventListener('click', async e => {
  const btn = e.target.closest('[data-action]')
  if (!btn) return
  const action = btn.dataset.action
  permEl.classList.remove('show')
  setSend(false)
  showTyping()

  try {
    const res = await fetch(`${API}/api/chat/resume`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        granted: action !== 'deny',
        always_allow: action === 'always'
      })
    })
    if (!res.ok) throw new Error(`${res.status}`)
    await processStream(res)
  } catch (_) {
    finalizeStreamingBubble()
    removeTyping()
    setSend(true)
  }
})

// ── Input ────────────────────────────────────────────────────
function resizeInp() {
  inpEl.style.height = 'auto'
  inpEl.style.height = Math.min(inpEl.scrollHeight, 100) + 'px'
}

inpEl.addEventListener('input', resizeInp)
inpEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend() }
})
sendBtn.addEventListener('click', doSend)
</script>
</body>
</html>
